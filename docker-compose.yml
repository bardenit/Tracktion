version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: vehicle-tracker-postgres
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vehicle-tracker-network
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vehicle-tracker-api
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      STORAGE_TYPE: ${STORAGE_TYPE}
      LOCAL_STORAGE_PATH: ${LOCAL_STORAGE_PATH}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_BUCKET_NAME: ${AWS_BUCKET_NAME}
      B2_APP_KEY_ID: ${B2_APP_KEY_ID}
      B2_APP_KEY: ${B2_APP_KEY}
      B2_BUCKET_ID: ${B2_BUCKET_ID}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME}
      ENVIRONMENT: ${ENVIRONMENT}
      DEBUG: ${DEBUG}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /data/documents:/data/documents
    networks:
      - vehicle-tracker-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vehicle-tracker-frontend
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - vehicle-tracker-network
    restart: unless-stopped

  # Optional: MinIO for local S3-compatible storage
  minio:
    image: minio/minio:latest
    container_name: vehicle-tracker-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/minio_data
    command: server /minio_data --console-address ":9001"
    networks:
      - vehicle-tracker-network
    restart: unless-stopped
    profiles:
      - minio

volumes:
  postgres_data:
  minio_data:

networks:
  vehicle-tracker-network:
    driver: bridge
