services:
  api:
    image: jbarden75/tracktion-backend:latest
    container_name: vehicle-tracker-api
    environment:
      JWT_SECRET_KEY: "${JWT_SECRET_KEY}"
      DATABASE_URL: "${DATABASE_URL}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      STORAGE_TYPE: "${STORAGE_TYPE:-}"
      STORAGE_S3_ENDPOINT: "${STORAGE_S3_ENDPOINT:-}"
      STORAGE_S3_BUCKET: "${STORAGE_S3_BUCKET:-}"
      STORAGE_S3_REGION: "${STORAGE_S3_REGION:-}"
      STORAGE_S3_ACCESS_KEY: "${STORAGE_S3_ACCESS_KEY:-}"
      STORAGE_S3_SECRET_KEY: "${STORAGE_S3_SECRET_KEY:-}"
      ENVIRONMENT: production
      DEBUG: "false"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    networks:
      - vehicle-tracker-network
    restart: unless-stopped

  frontend:
    image: jbarden75/tracktion-frontend:latest
    container_name: vehicle-tracker-frontend
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - vehicle-tracker-network
    restart: unless-stopped

networks:
  vehicle-tracker-network:
    driver: bridge
