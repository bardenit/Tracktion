version: '3.8'

services:
  api:
    image: jbarden75/tracktion-backend:latest
    container_name: vehicle-tracker-api
    environment:
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      DATABASE_URL: ${DATABASE_URL:-}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-false}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    networks:
      - vehicle-tracker-network
    restart: unless-stopped

  frontend:
    image: jbarden75/tracktion-frontend:latest
    container_name: vehicle-tracker-frontend
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - vehicle-tracker-network
    restart: unless-stopped

networks:
  vehicle-tracker-network:
    driver: bridge
