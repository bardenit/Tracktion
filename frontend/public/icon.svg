<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0f172a"/>

  <!-- Speedometer track (dim) — 7 o'clock to 5 o'clock clockwise through 12 -->
  <path d="M 176 395 A 160 160 0 1 1 336 395"
        fill="none" stroke="#1e293b" stroke-width="30" stroke-linecap="round"/>

  <!-- Active arc (teal) — 7 o'clock to ~12 o'clock -->
  <path d="M 176 395 A 160 160 0 0 1 256 96"
        fill="none" stroke="#0d9488" stroke-width="30" stroke-linecap="round"/>

  <!-- Needle -->
  <line x1="256" y1="270" x2="256" y2="120"
        stroke="white" stroke-width="14" stroke-linecap="round"/>

  <!-- Center hub outer -->
  <circle cx="256" cy="270" r="22" fill="#0d9488"/>
  <!-- Center hub inner -->
  <circle cx="256" cy="270" r="10" fill="#0f172a"/>
</svg>
